<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 680" font-family="'Segoe UI', 'Noto Sans TC', 'Microsoft JhengHei', -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6B7280"/>
    </marker>
    <marker id="arrowBi" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6B7280"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1040" height="680" fill="#FFFFFF"/>

  <!-- 標題 -->
  <text x="520" y="26" text-anchor="middle" font-size="19" font-weight="700" fill="#111827">Super-Memory 架構與資料流</text>
  <text x="520" y="46" text-anchor="middle" font-size="12" fill="#6B7280">super-memory（協調） + chroma-hybrid-search（檢索） + memory-backup（備份／還原）</text>

  <!-- Row A: 使用者/Agent -->
  <rect x="300" y="60" width="440" height="50" rx="10" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="520" y="82" text-anchor="middle" font-size="14" font-weight="700" fill="#5B21B6">使用者 ↔ AI Agent</text>
  <text x="520" y="100" text-anchor="middle" font-size="11" fill="#6B7280">每輪對話觸發 super-memory</text>

  <line x1="520" y1="110" x2="520" y2="138" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Row B: super-memory 主導技能 -->
  <rect x="70" y="140" width="900" height="110" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="520" y="164" text-anchor="middle" font-size="15" font-weight="700" fill="#312E81">super-memory（主導／協調技能）</text>
  <text x="520" y="182" text-anchor="middle" font-size="11" fill="#6B7280">Self-Evolving Knowledge Core Loop · 每輪對話執行</text>
  <text x="520" y="206" text-anchor="middle" font-size="12" fill="#374151">1 抽取關鍵詞 → 2 話題切換判斷 → 3 跨技能經驗讀取（強制）</text>
  <text x="520" y="226" text-anchor="middle" font-size="12" fill="#374151">→ 4 知識庫檢索（MD 優先／RAG 備援） → 5 任務完成・主動記錄</text>

  <!-- arrows B -> C -->
  <line x1="290" y1="250" x2="290" y2="278" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="215" y="268" font-size="10.5" fill="#6B7280">委派檢索</text>

  <line x1="755" y1="250" x2="755" y2="278" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="775" y="268" font-size="10.5" fill="#6B7280">委派備份／還原</text>

  <!-- Row C left: chroma-hybrid-search -->
  <rect x="70" y="280" width="440" height="110" rx="10" fill="#ECFDF5" stroke="#0D9488" stroke-width="1.5"/>
  <text x="290" y="306" text-anchor="middle" font-size="14" font-weight="700" fill="#065F46">chroma-hybrid-search</text>
  <text x="290" y="326" text-anchor="middle" font-size="12" fill="#374151">BM25 ＋ Chroma 向量搜尋</text>
  <text x="290" y="344" text-anchor="middle" font-size="12" fill="#374151">＋ BGE-Reranker 語意重排</text>
  <text x="290" y="364" text-anchor="middle" font-size="10.5" fill="#6B7280">高精度檢索・抑制幻覺（rerank score &gt; 0.35）</text>

  <!-- Row C right: memory-backup -->
  <rect x="540" y="280" width="430" height="110" rx="10" fill="#FFF7ED" stroke="#D97706" stroke-width="1.5"/>
  <text x="755" y="306" text-anchor="middle" font-size="14" font-weight="700" fill="#92400E">memory-backup</text>
  <text x="755" y="326" text-anchor="middle" font-size="12" fill="#374151">匯出 ChromaDB → JSONL</text>
  <text x="755" y="344" text-anchor="middle" font-size="12" fill="#374151">備份／還原 GitHub 私有 Repo</text>
  <text x="755" y="364" text-anchor="middle" font-size="10.5" fill="#6B7280">安全推送・避免覆蓋其他裝置備份</text>

  <!-- arrow chroma -> storage -->
  <line x1="290" y1="390" x2="290" y2="438" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="305" y="418" font-size="10.5" fill="#6B7280">讀取／索引</text>

  <!-- arrow memory-backup <-> storage (bidirectional) -->
  <line x1="660" y1="390" x2="610" y2="438" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowBi)" marker-start="url(#arrowBi)"/>
  <text x="635" y="420" font-size="10" fill="#6B7280">備份讀取／還原寫入</text>

  <!-- arrow memory-backup <-> github (bidirectional) -->
  <line x1="845" y1="390" x2="845" y2="468" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowBi)" marker-start="url(#arrowBi)"/>
  <text x="858" y="430" font-size="10.5" fill="#6B7280">push ⇄ pull</text>

  <!-- Row D: 本地儲存層 container -->
  <rect x="70" y="440" width="600" height="170" rx="10" fill="#FAFAFA" stroke="#9CA3AF" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="90" y="458" font-size="11.5" font-weight="700" fill="#4B5563">本地儲存層 Local Storage</text>

  <!-- Hot store -->
  <rect x="95" y="468" width="260" height="122" rx="8" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5"/>
  <text x="225" y="494" text-anchor="middle" font-size="13" font-weight="700" fill="#991B1B">熱庫 Hot Store</text>
  <text x="225" y="514" text-anchor="middle" font-size="11" fill="#374151">knowledge-base/*.md</text>
  <text x="225" y="532" text-anchor="middle" font-size="11" fill="#374151">experience/*.md</text>
  <text x="225" y="554" text-anchor="middle" font-size="10" fill="#6B7280">人工精選・關鍵詞索引</text>

  <!-- Cold store -->
  <rect x="385" y="468" width="260" height="122" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="515" y="494" text-anchor="middle" font-size="13" font-weight="700" fill="#1E3A8A">冷庫 Cold Store</text>
  <text x="515" y="514" text-anchor="middle" font-size="11" fill="#374151">cold-notes/raw.jsonl</text>
  <text x="515" y="532" text-anchor="middle" font-size="11" fill="#374151">append-only・即寫即用</text>
  <text x="515" y="554" text-anchor="middle" font-size="10" fill="#6B7280">累積達閾值後精煉 → 升級至熱庫</text>

  <!-- GitHub box -->
  <rect x="720" y="468" width="250" height="122" rx="8" fill="#F3F4F6" stroke="#24292E" stroke-width="1.5"/>
  <text x="845" y="498" text-anchor="middle" font-size="13" font-weight="700" fill="#24292E">GitHub 私有 Repo</text>
  <text x="845" y="520" text-anchor="middle" font-size="11" fill="#374151">knowledge-base/ ＋ experience/</text>
  <text x="845" y="538" text-anchor="middle" font-size="11" fill="#374151">＋ chroma_export.jsonl</text>
  <text x="845" y="560" text-anchor="middle" font-size="10" fill="#6B7280">可攜式・跨裝置同步</text>

  <!-- Footer -->
  <text x="520" y="650" text-anchor="middle" font-size="11.5" fill="#9CA3AF">Super-Memory · AI 自進化知識積累與混合檢索系統</text>
</svg>
